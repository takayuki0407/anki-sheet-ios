<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />
    <title>anki-sheet engine</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, system-ui, sans-serif;
        background: #fffdf7;
        color: #333;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #status {
        padding: 12px;
        font-size: 14px;
        color: #888;
      }

      /* ---- red-sheet viewer ---- */
      #viewer {
        position: fixed;
        inset: 0;
        display: none; /* shown only when the viewer is opened */
        overflow: auto;
        overscroll-behavior: contain;
        background: #525659;
        /* We own panning/zoom (custom touch handlers) for axis-lock + pinch. */
        touch-action: none;
      }
      #viewer.paged {
        overflow: hidden;
        align-items: center;
        justify-content: center;
      }
      .vcontent {
        display: flex;
        flex-direction: column;
        align-items: center;
        transform-origin: 0 0;
        will-change: transform;
      }
      .vpage {
        position: relative;
        margin: 0 0 8px;
        background: #fff;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
      }
      #viewer.paged .vpage {
        margin: 0;
      }
      .vcanvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .vmasks {
        position: absolute;
        inset: 0;
      }
      .vmask {
        position: absolute;
        background: #e23b3b;
        border-radius: 2px;
        box-shadow: 0 0 0 1px rgba(226, 59, 59, 0.45);
      }
      .vmask.revealed {
        background: transparent;
        box-shadow: none;
      }
      #viewer.sheet-off .vmask {
        background: transparent;
        box-shadow: none;
        pointer-events: none;
      }
      /* 赤シート (manual band) mode: masks stay visible (the band position reveals them) but
         don't intercept touches, so the page scrolls/swipes through them. They're painted in the
         SHEET's red (not the brighter 赤マスク red) so the covered region reads as one cohesive
         red sheet rather than separate bright boxes. */
      #viewer.manual .vmask {
        pointer-events: none;
        background: rgba(200, 60, 60, 0.92);
        box-shadow: none;
      }
      #viewer.manual .vmask.revealed {
        background: transparent; /* keep revealed answers see-through (higher specificity wins) */
      }
      .tapzone {
        position: fixed;
        top: 0;
        bottom: 0;
        width: 26%;
        z-index: 5;
      }
      .tapzone.left {
        left: 0;
      }
      .tapzone.right {
        right: 0;
      }
      /* Manual red sheet (縦読み): a draggable band slid over the page like a physical 赤シート.
         The band is only a faint tint (NO blur / NO heavy filter) so the BLACK body text stays
         crisp — the actual hiding is done by the detection masks (.vmask), which the band's
         position reveals/covers (answer above the top edge = revealed, below = hidden). This
         hides ONLY the red answers and never touches the black text. */
      .rsheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0; /* the bottom edge stays at the viewport bottom; only the top edge moves */
        z-index: 8;
        background: rgba(200, 60, 60, 0.14); /* faint warm tint — black stays crisp */
        box-shadow: inset 0 2px 0 rgba(190, 24, 60, 0.55); /* a line marking the top edge */
        pointer-events: none; /* scroll / swipe the page through the sheet */
      }
      /* Two slim grab handles at the LEFT and RIGHT ends of the top edge (not the centre, which
         covered the text being read). Both drag the top edge. Kept short so they don't obscure. */
      .rsheet-grip {
        position: fixed;
        width: 92px;
        height: 12px;
        z-index: 9;
        border-radius: 6px;
        background: #d24b4b;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.35);
        touch-action: none;
      }
      .rsheet-grip.left {
        left: 12px;
      }
      .rsheet-grip.right {
        right: 12px;
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <div id="status">engine loading…</div>
    <script type="module" src="/src/bridge.ts"></script>
  </body>
</html>
