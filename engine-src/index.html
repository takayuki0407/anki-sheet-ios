<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>anki-sheet engine</title>
    <style>
      html {
        height: 100%;
        background: #e9e2d3; /* overscroll/bounce area shows through when the viewer is open (warm beige to match the app theme) */
      }
      body {
        margin: 0;
        min-height: 100%; /* grows with content so the native scroll view can scroll the document */
        font-family: -apple-system, system-ui, sans-serif;
        background: #fffdf7;
        color: #333;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #status {
        padding: 12px;
        font-size: 14px;
        color: #888;
      }

      /* ---- red-sheet viewer ---- */
      #viewer {
        display: none; /* shown (block / flex) when a book is opened */
        min-height: 100vh;
        background: #e9e2d3;
        /* The native WKWebView scroll view scrolls the whole document (RN: scrollEnabled +
           directionalLockEnabled), so iOS supplies Safari-grade momentum AND axis-direction lock —
           a near-vertical swipe is locked to vertical by UIScrollView, no JS needed. pan-x pan-y
           permits panning both axes but not native pinch-zoom (custom pinch handles zoom). */
        touch-action: pan-x pan-y;
      }
      /* While drawing a mask region (edit), block native scroll so the drag draws. */
      #viewer.drawing {
        touch-action: none;
      }
      #viewer.paged {
        align-items: safe center;
        justify-content: safe center;
      }
      .vcontent {
        display: flex;
        flex-direction: column;
        /* safe center: centre pages that fit, but fall back to start when a zoomed page overflows
           so its left/top edge stays reachable (plain center makes the overflow unreachable). */
        align-items: safe center;
        transform-origin: 0 0;
        will-change: transform;
      }
      .vpage {
        position: relative;
        margin: 0 0 8px;
        background: #fff;
        box-shadow: 0 1px 5px rgba(80, 65, 40, 0.22);
      }
      #viewer.paged .vpage {
        margin: 0;
      }
      .vcanvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .vmasks {
        position: absolute;
        inset: 0;
      }
      .vmask {
        position: absolute;
        background: #e23b3b;
        border-radius: 2px;
        box-shadow: 0 0 0 1px rgba(226, 59, 59, 0.45);
      }
      .vmask.revealed {
        background: transparent;
        /* faint outline where a revealed answer was, so it's easy to find + re-hide */
        box-shadow: inset 0 0 0 1px rgba(226, 59, 59, 0.3);
      }
      #viewer.sheet-off .vmask {
        background: transparent;
        box-shadow: none;
        pointer-events: none;
      }
      /* 赤シート (manual band) mode: masks stay visible (the band position reveals them) but
         don't intercept touches, so the page scrolls/swipes through them. They're painted in the
         SHEET's red (not the brighter 赤マスク red) so the covered region reads as one cohesive
         red sheet rather than separate bright boxes. */
      #viewer.manual .vmask {
        pointer-events: none;
        background: rgba(200, 60, 60, 0.92);
        box-shadow: none;
      }
      #viewer.manual .vmask.revealed {
        background: transparent; /* keep revealed answers see-through (higher specificity wins) */
        box-shadow: none; /* no per-mask outline in 赤シート band mode (many reveal at once) */
      }
      /* ---- manual mask editing ---- */
      /* masks become translucent outlines (text visible underneath) and tappable to delete */
      #viewer.editing .vmask {
        background: rgba(226, 59, 59, 0.28);
        box-shadow: inset 0 0 0 1px #e23b3b;
      }
      #viewer.drawing .vmask {
        pointer-events: none; /* while drawing a region, the drag owns the gesture */
      }
      .vdrawrect {
        position: absolute;
        z-index: 6;
        background: rgba(226, 59, 59, 0.22);
        box-shadow: inset 0 0 0 1.5px #e23b3b;
        pointer-events: none;
      }
      .vdrawrect.del {
        background: rgba(37, 99, 235, 0.16);
        box-shadow: inset 0 0 0 1.5px #2563eb;
      }
      /* ---- study tracking: ★ badge on a starred answer's mask ---- */
      .vstar {
        position: absolute;
        top: -7px;
        right: -5px;
        font-size: 11px;
        line-height: 1;
        color: #f5b301;
        text-shadow: 0 0 2px rgba(0, 0, 0, 0.6);
        pointer-events: none;
      }
      .tapzone {
        position: fixed;
        top: 0;
        bottom: 0;
        width: 26%;
        z-index: 5;
      }
      .tapzone.left {
        left: 0;
      }
      .tapzone.right {
        right: 0;
      }
      /* Manual red sheet (縦読み): a draggable band slid over the page like a physical 赤シート.
         The band is only a faint tint (NO blur / NO heavy filter) so the BLACK body text stays
         crisp — the actual hiding is done by the detection masks (.vmask), which the band's
         position reveals/covers (answer above the top edge = revealed, below = hidden). This
         hides ONLY the red answers and never touches the black text. */
      .rsheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0; /* the bottom edge stays at the viewport bottom; only the top edge moves */
        z-index: 8;
        background: rgba(200, 60, 60, 0.14); /* faint warm tint — black stays crisp */
        pointer-events: none; /* scroll / swipe the page through the sheet */
      }
      /* A small, semi-transparent handle centred on the top edge. The element is a larger
         transparent touch target; the visible bar (::before) is small so it barely obscures. */
      .rsheet-grip {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        width: 56px;
        height: 20px;
        z-index: 9;
        background: transparent;
        touch-action: none;
      }
      .rsheet-grip::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 32px;
        height: 6px;
        border-radius: 3px;
        background: rgba(200, 60, 60, 0.34); /* the sheet's red, just slightly denser */
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <div id="status">engine loading…</div>
    <script type="module" src="/src/bridge.ts"></script>
  </body>
</html>
