<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />
    <title>anki-sheet engine</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, system-ui, sans-serif;
        background: #fffdf7;
        color: #333;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #status {
        padding: 12px;
        font-size: 14px;
        color: #888;
      }

      /* ---- red-sheet viewer ---- */
      #viewer {
        position: fixed;
        inset: 0;
        display: none; /* shown only when the viewer is opened */
        overflow: auto;
        overscroll-behavior: contain;
        background: #525659;
        /* We own panning/zoom (custom touch handlers) for axis-lock + pinch. */
        touch-action: none;
      }
      #viewer.paged {
        overflow: hidden;
        align-items: center;
        justify-content: center;
      }
      .vcontent {
        display: flex;
        flex-direction: column;
        align-items: center;
        transform-origin: 0 0;
        will-change: transform;
      }
      .vpage {
        position: relative;
        margin: 0 0 8px;
        background: #fff;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
      }
      #viewer.paged .vpage {
        margin: 0;
      }
      .vcanvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .vmasks {
        position: absolute;
        inset: 0;
      }
      .vmask {
        position: absolute;
        background: #e23b3b;
        border-radius: 2px;
        box-shadow: 0 0 0 1px rgba(226, 59, 59, 0.45);
      }
      .vmask.revealed {
        background: transparent;
        box-shadow: none;
      }
      #viewer.sheet-off .vmask {
        background: transparent;
        box-shadow: none;
        pointer-events: none;
      }
      .tapzone {
        position: fixed;
        top: 0;
        bottom: 0;
        width: 26%;
        z-index: 5;
      }
      .tapzone.left {
        left: 0;
      }
      .tapzone.right {
        right: 0;
      }
      /* Manual red sheet (縦読み): a draggable / resizable band fixed over the viewport.
         multiply keeps black text readable while red/magenta answers vanish under it. */
      .rsheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0; /* the bottom edge stays at the viewport bottom; only the top edge moves */
        z-index: 8;
        /* Muted-red multiply keeps black text BLACK (black × red = black) while it desaturates the
           red/magenta answers toward the red background (a slight trace may remain). */
        background: #c83232;
        mix-blend-mode: multiply;
        box-shadow: inset 0 2px 0 rgba(190, 24, 60, 0.6); /* a line marking the top edge */
        pointer-events: none; /* scroll / swipe the page through the sheet */
      }
      .rsheet-grip {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        width: 72px;
        height: 26px;
        z-index: 9;
        border-radius: 13px;
        background: #e05a5a;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <div id="status">engine loading…</div>
    <script type="module" src="/src/bridge.ts"></script>
  </body>
</html>
