<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />
    <title>anki-sheet engine</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, system-ui, sans-serif;
        background: #fffdf7;
        color: #333;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #status {
        padding: 12px;
        font-size: 14px;
        color: #888;
      }

      /* ---- red-sheet viewer ---- */
      #viewer {
        position: fixed;
        inset: 0;
        display: none; /* shown only when the viewer is opened */
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        background: #525659;
      }
      #viewer.paged {
        overflow: hidden;
        align-items: center;
        justify-content: center;
      }
      .vpage {
        position: relative;
        margin: 8px auto;
        background: #fff;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
      }
      #viewer.paged .vpage {
        margin: 0;
      }
      .vcanvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .vmasks {
        position: absolute;
        inset: 0;
      }
      .vmask {
        position: absolute;
        background: #e23b3b;
        border-radius: 2px;
        box-shadow: 0 0 0 1px rgba(226, 59, 59, 0.45);
      }
      .vmask.revealed {
        background: transparent;
        box-shadow: none;
      }
      #viewer.sheet-off .vmask {
        background: transparent;
        box-shadow: none;
        pointer-events: none;
      }
      .tapzone {
        position: fixed;
        top: 0;
        bottom: 0;
        width: 26%;
        z-index: 5;
      }
      .tapzone.left {
        left: 0;
      }
      .tapzone.right {
        right: 0;
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <div id="status">engine loading…</div>
    <script type="module" src="/src/bridge.ts"></script>
  </body>
</html>
